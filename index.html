<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KBO 실시간 스코어보드</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        .game-card { background: white; border-radius: 12px; padding: 20px; margin: 10px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .team-name { font-size: 1.2rem; font-weight: bold; }
        .score { font-size: 1.5rem; color: #007bff; }
        .status { text-align: center; color: #666; font-size: 0.9rem; border-top: 1px solid #eee; pt: 10px; }
        .update-time { font-size: 0.8rem; color: #999; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>⚾ KBO LIVE</h1>
    <div id="update-time" class="update-time">대기 중...</div>
    <div id="game-container">경기를 불러오는 중입니다...</div>

    <script>
        async function updateScores() {
            try {
                const res = await fetch('/api/kbo');
                const data = await res.json();
                const games = data.result.gameList;

                const container = document.getElementById('game-container');
                container.innerHTML = '';

                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="team-row">
                            <span class="team-name">${game.awayTeamName}</span>
                            <span class="score">${game.awayTeamScore}</span>
                        </div>
                        <div class="team-row">
                            <span class="team-name">${game.homeTeamName}</span>
                            <span class="score">${game.homeTeamScore}</span>
                        </div>
                        <div class="status">${game.gameStatusStr} | ${game.venue}</div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('update-time').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error("데이터 로딩 실패", e);
            }
        }

        // 5초마다 갱신
        setInterval(updateScores, 5000);
        updateScores(); // 초기 실행
    </script>
</body>
</html>
